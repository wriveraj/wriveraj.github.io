let state={};
REPAIRS.forEach(r=>{state[r.id]={status:"To Do",notes:""}});
let aP="all",aC="all",openId=null;

function pOrder(p){return{Immediate:0,"Near-Term":1,"Long-Term":2,Maintenance:3}[p]??4}
function pClass(p){return{Immediate:"bp-immediate","Near-Term":"bp-nearterm","Long-Term":"bp-longterm",Maintenance:"bp-maintenance"}[p]||""}
function fmt(n){return n===0?"Free":"$"+n.toLocaleString()}
function permitClass(p){return p==="Yes"?"permit-yes":p==="No"?"permit-no":"permit-likely"}
function diyClass(d){return d==="Yes"?"diy-yes":d==="No"?"diy-no":"diy-maybe"}

function setSync(status,msg){document.getElementById("dot").className="dot "+status;document.getElementById("sync-msg").textContent=msg;}

async function loadData(){
  setSync("yellow","Connecting...");
  if(!binId){
    try{
      let r=await fetch("https://api.jsonbin.io/v3/b",{method:"POST",headers:{"Content-Type":"application/json","X-Master-Key":API_KEY,"X-Bin-Name":"surrey-repair-tracker"},body:JSON.stringify(state)});
      let d=await r.json();
      binId=d.metadata.id;
      localStorage.setItem(BIN_ID_KEY,binId);
      setSync("green","Synced");
    }catch(e){setSync("red","Offline");}
  }else{
    try{
      let r=await fetch("https://api.jsonbin.io/v3/b/"+binId+"/latest",{headers:{"X-Master-Key":API_KEY}});
      let d=await r.json();
      state=d.record;
      setSync("green","Synced");
    }catch(e){setSync("red","Offline");}
  }
  render();
}

async function saveData(){
  setSync("yellow","Saving...");
  try{
    await fetch("https://api.jsonbin.io/v3/b/"+binId,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},body:JSON.stringify(state)});
    setSync("green","Saved");
  }catch(e){setSync("red","Save failed");}
}

function render(){
  let q=(document.getElementById("srch")||{}).value||"";
  let rows=REPAIRS.filter(r=>(aP==="all"||r.priority===aP)&&(aC==="all"||r.cat===aC)&&(!q||r.issue.toLowerCase().includes(q.toLowerCase())||r.cat.toLowerCase().includes(q.toLowerCase()))).sort((a,b)=>pOrder(a.priority)-pOrder(b.priority));
  let counts={Immediate:0,"Near-Term":0,"Long-Term":0,Maintenance:0};
  REPAIRS.forEach(r=>{counts[r.priority]=(counts[r.priority]||0)+1});
  document.getElementById("stats").innerHTML=`<div class="stat"><div class="stat-n n-red">${counts.Immediate}</div><div class="stat-l">Immediate</div></div><div class="stat"><div class="stat-n n-amber">${counts["Near-Term"]}</div><div class="stat-l">Near-Term</div></div><div class="stat"><div class="stat-n n-green">${counts["Long-Term"]}</div><div class="stat-l">Long-Term</div></div><div class="stat"><div class="stat-n n-blue">${counts.Maintenance}</div><div class="stat-l">Maintenance</div></div>`;
  let html="";
  if(rows.length===0){html='<div class="empty">No items match your filters.</div>';}
  rows.forEach(r=>{
    let open=openId===r.id;
    let rs=state[r.id]||{status:"To Do",notes:""};
    let stepHtml=r.steps.map((s,i)=>`<div class="step"><div class="step-num">${i+1}</div><div class="step-txt">${s}</div></div>`).join("");
    let matHtml=r.materials.map(m=>`<span class="mat">${m}</span>`).join("");
    html+=`<div class="row${open?" open":""}" id="row${r.id}"><div class="row-top" onclick="toggle(${r.id})"><div class="row-title">${r.issue}</div><span class="bcat">${r.cat}</span><span class="badge ${pClass(r.priority)}">${r.priority}</span><span style="font-size:13px;font-weight:500;white-space:nowrap">${fmt(r.costLow)}&ndash;${fmt(r.costHigh)}</span><span class="chevron">&#8964;</span></div><div class="detail"><div class="detail-grid"><div class="dbox"><div class="dbox-label">Cost range</div><div class="dbox-val">${fmt(r.costLow)} &ndash; ${fmt(r.costHigh)}</div></div><div class="dbox"><div class="dbox-label">Contractor</div><div class="dbox-val">${r.contractor}</div></div><div class="dbox"><div class="dbox-label">Permit required</div><div class="dbox-val ${permitClass(r.permit)}">${r.permit}</div></div></div><div class="detail-grid two"><div class="dbox"><div class="dbox-label">DIY possible</div><div class="dbox-val ${diyClass(r.diy)}">${r.diy}</div></div><div class="dbox"><div class="dbox-label">Inspector finding</div><div class="dbox-val" style="font-weight:300;font-size:12px">${r.inspector}</div></div></div><div class="sec-title">Step-by-step guide</div><div class="steps">${stepHtml}</div><div class="sec-title" style="margin-top:14px">Materials and supplies</div><div class="mats">${matHtml}</div><div class="sec-title" style="margin-top:14px">Notes</div><div class="notes-area"><textarea placeholder="Contractor quotes, contact info, updates..." onchange="state[${r.id}].notes=this.value">${rs.notes}</textarea></div><div class="status-row"><label>Status</label><select onchange="state[${r.id}].status=this.value;render()"><option ${rs.status==="To Do"?"selected":""}>To Do</option><option ${rs.status==="In Progress"?"selected":""}>In Progress</option><option ${rs.status==="Done"?"selected":""}>Done</option></select><span style="font-size:11px;color:var(--muted);font-family:var(--font-mono);margin-left:auto">${rs.status==="Done"?"complete":rs.status==="In Progress"?"in progress":"not started"}</span></div></div></div>`;
  });
  document.getElementById("list").innerHTML=html;
}

function toggle(id){openId=openId===id?null:id;render();}
function fp(p,el){aP=p;document.querySelectorAll(".fbtn").forEach(b=>{if(["All","Immediate","Near-Term","Long-Term","Maintenance"].includes(b.textContent))b.classList.remove("on");});if(el)el.classList.add("on");render();}
function fc(c,el){if(aC===c){aC="all";el.classList.remove("on");}else{document.querySelectorAll(".fbtn").forEach(b=>{if(["Structural","Electrical","Roofing","Plumbing","HVAC","Interior","Exterior"].includes(b.textContent))b.classList.remove("on");});aC=c;el.classList.add("on");}render();}
loadData();
</script>
</body>
</html>
